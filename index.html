<!DOCTYPE html>
<html>
<head>
  <title>Medivance Health AI</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      max-width: 700px;
      margin: auto;
    }

    textarea {
      width: 100%;
      height: 150px;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      cursor: pointer;
    }

    pre {
      white-space: pre-wrap;
      margin-top: 20px;
      background: #f4f4f4;
      padding: 15px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <h1>Medivance Health AI</h1>

  <p>Describe your symptoms below:</p>

  <textarea id="symptoms"></textarea>

  <br>

  <button onclick="analyzeSymptoms()">Analyze</button>

  <pre id="result"></pre>

  <script>
    async function analyzeSymptoms() {

      const symptoms =
        document.getElementById("symptoms").value;

      const result =
        document.getElementById("result");

      result.innerText = "Analyzing...";

      const response = await fetch(
        "https://medivance-health-ai.onrender.com/analyze",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ symptoms })
        }
      );

      const data = await response.json();

      result.innerText = data.result;
    }
  </script>

</body>
</html>
